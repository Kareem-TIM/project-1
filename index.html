<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Student Management System</title>
  </head>
  <body>
    
    <div class="container">
        <div class="text-center"> <h2>Add students</h2></div>
        <div class="student-form-container">
        <form id="studentForm">
            <div class="row">
            <div class="mb-4 col-12">
                <label for="name" class="form-label" >Name</label>
                <input class="form-control" type="text" placeholder="Enter your name"  id="name">
            </div>
            <div class="mb-4 col-12">
                <label for="age" class="form-label" >age</label>
                <input class="form-control" type="number" placeholder="Enter your age" id="age" min="0" max="100">
            </div>
            <div class="mb-4 col-12">
                <label for="grade" class="form-label">grade</label>
                <input class="form-control" type="number" placeholder="Enter your grade" id="grade" min="0" max="100" step="0.01" inputmode="decimal">
            </div>
            <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-success">Add</button>
            </div>
            </div>
        </div>
        </form>


        <table id="studentTable" class="table table-striped table-bordered table-hover">
            <thead class="table-dark text-center">
                <th>id</th>
                <th>name</th>
                <th>age</th>
                <th>grade</th>
                <th>actions</th>
            </thead>
            <tbody class="text-center">
            </tbody>
        </table>
        </div>
    </div>
    <div class="container text-center" id="div-view">

    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
